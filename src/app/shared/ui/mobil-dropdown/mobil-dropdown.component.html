<div>
  <button
    class="mobile-menu-toggle md:hidden"
    (click)="toggleDropdown()">
    <mat-icon>{{ isDropdownOpen ? 'close' : 'menu' }}</mat-icon>
  </button>

  <aside
    class="mobile-menu-panel fixed inset-y-0 left-0 z-40 h-full w-64 transform transition-transform duration-300 ease-in-out"
    [ngClass]="{ '-translate-x-full': !isDropdownOpen }">
    <div class="p-6">
      <h6 class="mobile-menu-title text-base font-semibold">Menu</h6>
    </div>
    <div class="m-6">
      <hr class="mobile-divider mt-6 p-2 border-dashed">
      <div class="mobile-section-header flex items-center justify-between">
        <a class="text-xs uppercase">Workspace</a>
        <i
          class="pi pi-plus-circle text-xs uppercase rounded-full mobile-section-action"
        [routerLink]="['/workspaces/new']"></i>
      </div>
      <app-workspace-switcher (workspaceSelected)="onWorkspaceSelected($event)"></app-workspace-switcher>
      <hr class="mobile-divider mt-6 p-2 border-dashed">
    </div>
    <div class="m-6">
      @for (item of menuItems; track item) {
        <a
          class="mobile-menu-link flex items-center gap-6 py-2 px-6 rounded-md transition-transform duration-300 mt-6 text-xs uppercase"
          mat-list-item
          [routerLink]="item.route"
          routerLinkActive="mobile-link-active"
          [routerLinkActiveOptions]="{ exact: true }">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </div>
    <div class="m-6">
      <hr class="mobile-divider mt-6 p-2 border-dashed">
      <div class="mobile-section-header flex items-center justify-between">
        <a class="text-xs uppercase">projects </a>
        <i class="pi pi-plus-circle text-xs uppercase rounded-full mobile-section-action" (click)="openModal()"></i>
      </div>
      <app-project-list [workspace]="selectedWorkspaceId"></app-project-list>
    </div>
  </aside>

  @if (isDropdownOpen) {
    <div
      class="fixed inset-0 bg-black bg-opacity-50 z-30 md:hidden"
      (click)="closeDropdown()">
    </div>
  }
</div>
